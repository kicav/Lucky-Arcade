name: Lucky Arcade tests

on:
  push:
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3
          coverage: none
      - name: Create Laravel test application
        run: composer create-project --no-interaction --prefer-dist laravel/laravel:^13.0 lucky-arcade-ci
      - name: Apply Lucky Arcade overlay
        run: cp -R overlay/. lucky-arcade-ci/
      - name: Configure SQLite
        working-directory: lucky-arcade-ci
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate
      - name: Migrate and test
        working-directory: lucky-arcade-ci
        run: |
          php artisan migrate --seed --force
          php artisan test
